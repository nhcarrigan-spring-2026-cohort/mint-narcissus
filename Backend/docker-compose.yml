services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  items-service:
    build:
      context: .
      dockerfile: services/items-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

  requests-service:
    build:
      context: .
      dockerfile: services/requests-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003

  messaging-service:
    build:
      context: .
      dockerfile: services/messaging-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      - PORT=3004

